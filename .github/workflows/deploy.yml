name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.MYSECRET }}

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-docker.pkg.dev

      - name: Build and Push Docker image
        run: |
          docker build -t europe-docker.pkg.dev/ri-training-prod-499014/artifact-registry/lovable-demo:latest .
          docker push europe-docker.pkg.dev/ri-training-prod-499014/artifact-registry/lovable-demo:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy lovable-demo \
            --image europe-docker.pkg.dev/ri-training-prod-499014/artifact-registry/lovable-demo:latest \
            --region europe-north1 \
            --platform managed \
            --allow-unauthenticated
